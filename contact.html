<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Contact Spill — questions, ideas, tea talk.">
  <meta name="theme-color" content="#9abc04">
  <title>Contact — Spill</title>
  <link rel="canonical" href="https://spilltea.com/contact.html">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Spill">
  <meta property="og:title" content="Contact — Spill">
  <meta property="og:description" content="Questions, ideas, tea talk — we're all ears.">
  <meta property="og:url" content="https://spilltea.com/contact.html">
  <meta property="og:image" content="https://spilltea.com/Spill.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Contact — Spill">
  <meta name="twitter:description" content="Questions, ideas, tea talk.">
  <meta name="twitter:image" content="https://spilltea.com/Spill.png">
  <link rel="icon" href="Spill.png" type="image/png">
  <link rel="stylesheet" href="assets/inner.css">
  <link rel="stylesheet" href="assets/cookie-consent.css">
  <script src="assets/cookie-consent.js" defer></script>
  <style>
    :root { --accent: var(--lime); --accent-ink: var(--green); }
    .page-header { background: var(--lime); }
    .page-header h1 { color: var(--green); }
    .page-header .bg-accent { color: rgba(25,83,43,0.08); }
    .page-header::after { background: linear-gradient(to bottom, var(--lime), var(--cream)); }
    nav { background: var(--lime); }
    nav a.logo-nav, nav a.back-link { color: var(--green); }
    .content h2 { color: var(--green); }
    .contact-card {
      background: var(--green);
      border-radius: 24px;
      padding: 56px 40px;
      margin: 40px auto 0;
      max-width: 520px;
      text-align: center;
      box-shadow: 6px 6px 0 var(--yellow);
      transition: transform .3s, box-shadow .3s;
    }
    .contact-card:hover { transform: translate(-3px, -3px); box-shadow: 10px 10px 0 var(--yellow); }
    .contact-card h3 {
      font-family: 'Chomp Oblique', serif; font-style: italic;
      font-size: clamp(1.6rem, 4vw, 2rem);
      color: var(--yellow); margin-bottom: 20px; padding-right: 0.12em;
    }
    .contact-card p { color: var(--cream); opacity: 0.8; margin-bottom: 8px; }
    .contact-card a {
      color: var(--yellow); text-decoration: none;
      font-family: 'Chomp Oblique', serif; font-style: italic;
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      padding-right: 0.12em;
      word-break: break-word;
      transition: color .3s;
    }
    .contact-card a:hover { color: var(--lime); }
  </style>
</head>
<body>
  <nav aria-label="Primary">
    <a href="index.html" class="logo-nav">Spill</a>
    <a href="index.html" class="back-link">&larr; Back to home</a>
  </nav>

  <header class="page-header">
    <h1>Contact</h1>
    <span class="bg-accent" aria-hidden="true">Talk</span>
  </header>

  <main class="content content-center">
    <h2>Let&apos;s Chat</h2>
    <p>Got a question, idea, or just want to talk tea? We&apos;re all ears.</p>

    <div class="contact-card">
      <h3>Drop Us A Line</h3>
      <p>Email</p>
      <a href="mailto:hello@spilltea.com">hello@spilltea.com</a>
      <p style="margin-top:20px;">We typically respond within 24 hours.</p>
    </div>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Spill Tea Co. All rights reserved.</p>
  </footer>
</body>
</html>
