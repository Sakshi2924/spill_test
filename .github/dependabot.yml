version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    labels: ["deps"]
    commit-message:
      prefix: "deps"
      include: scope

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    labels: ["deps", "ci"]
