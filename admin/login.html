<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Admin Login — Spill</title>
  <link rel="icon" href="/Spill.png" type="image/png">
  <style>
    :root {
      --yellow: #ffca26;
      --cream:  #f3e8cc;
      --orange: #f86015;
      --red:    #d42518;
      --green:  #19532b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--green);
      color: var(--cream);
      min-height: 100vh;
      display: grid; place-items: center;
      padding: 20px;
    }
    .card {
      background: #0f3a1d;
      padding: 40px;
      border-radius: 20px;
      width: min(440px, 100%);
      box-shadow: 8px 8px 0 var(--yellow);
    }
    h1 {
      font-size: 2rem; color: var(--yellow);
      font-style: italic; margin-bottom: 8px;
    }
    p.sub { opacity: 0.75; margin-bottom: 28px; font-size: 0.9rem; }
    label { display: block; font-size: 0.8rem; letter-spacing: 1.5px; text-transform: uppercase; opacity: 0.7; margin-bottom: 8px; margin-top: 18px; }
    input[type=text], input[type=password] {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,202,38,0.2);
      border-radius: 10px;
      color: var(--cream);
      font-size: 1rem;
      font-family: inherit;
    }
    input:focus { outline: 2px solid var(--yellow); outline-offset: 1px; }
    input[inputmode=numeric] { letter-spacing: 0.5em; text-align: center; font-size: 1.4rem; }
    button {
      margin-top: 28px;
      width: 100%;
      padding: 14px;
      background: var(--yellow);
      color: var(--green);
      border: 0; border-radius: 10px;
      font-size: 1rem; font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    button:hover { transform: translateY(-2px); }
    button:disabled { opacity: 0.6; cursor: wait; }
    .error {
      margin-top: 18px;
      padding: 12px;
      background: rgba(212,37,24,0.2);
      border: 1px solid rgba(212,37,24,0.4);
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }
    .error.show { display: block; }
    .step { display: none; }
    .step.active { display: block; }
    a.back {
      display: inline-block; margin-top: 16px;
      font-size: 0.8rem; color: var(--yellow); opacity: 0.7;
      text-decoration: none;
    }
    a.back:hover { opacity: 1; }
  </style>
</head>
<body>
  <div class="card" role="main">
    <h1>Spill Admin</h1>
    <p class="sub" id="sub">Sign in to manage content.</p>

    <form id="stepCreds" class="step active" autocomplete="off">
      <label for="u">Username</label>
      <input id="u" name="username" type="text" autocomplete="username" required>

      <label for="p">Password</label>
      <input id="p" name="password" type="password" autocomplete="current-password" required>

      <div class="error" id="err1"></div>
      <button type="submit">Sign in</button>
    </form>

    <form id="step2fa" class="step" autocomplete="off">
      <label for="code">6-digit code from your authenticator</label>
      <input id="code" name="code" type="text" inputmode="numeric" pattern="\d{6}" maxlength="6" autocomplete="one-time-code" required>

      <div class="error" id="err2"></div>
      <button type="submit">Verify</button>
      <a href="#" class="back" id="restart">← Start over</a>
    </form>
  </div>

  <script src="/admin/login.js" defer></script>
</body>
</html>
